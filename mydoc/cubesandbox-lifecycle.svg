<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a16207"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="1400" height="1000" fill="#f8f6f3"/>
  <text x="700" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">CubeSandbox: 从 sandbox 拉起到脚本执行 流程图</text>
  <text x="700" y="60" text-anchor="middle" font-size="12" font-weight="400" fill="#6b7280">7 层链路 — POST /sandboxes → KVM → guest kernel → cube-agent → OCI 进程执行</text>
  <rect x="40" y="80" width="1320" height="90" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="105" font-size="13" font-weight="700" fill="#374151">External (Untrusted)</text>
  <rect x="560" y="105" width="280" height="55" rx="6" fill="#ffffff" stroke="#374151" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">Client (SDK / curl)</text>
  <text x="700" y="146" text-anchor="middle" font-size="11" fill="#6b7280">sdk/python/cubesandbox/sandbox.py:142</text>
  <rect x="40" y="190" width="1320" height="290" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <text x="60" y="215" font-size="13" font-weight="700" fill="#1e40af">Host Trust Domain (T1-T4 + L1-L7)</text>
  <text x="1290" y="215" text-anchor="end" font-size="11" font-weight="400" fill="#1e3a8a">guest = untrusted, host = privileged-but-minimal</text>
  <rect x="80" y="235" width="380" height="80" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="258" font-size="14" font-weight="700" fill="#1e40af">T1 CubeAPI ingress</text>
  <text x="100" y="278" font-size="11" fill="#374151">handlers/sandboxes.rs:158</text>
  <text x="100" y="293" font-size="11" fill="#374151">services/sandboxes.rs:146</text>
  <text x="100" y="308" font-size="10" fill="#1e3a8a">unified_auth + rate_limit + token 校验</text>
  <rect x="540" y="235" width="380" height="80" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="258" font-size="14" font-weight="700" fill="#1e40af">T2 CubeMaster</text>
  <text x="560" y="278" font-size="11" fill="#374151">scheduler + sandbox_run.go</text>
  <text x="560" y="293" font-size="11" fill="#374151">hostdir_mount.go:114 validateHostPath</text>
  <text x="560" y="308" font-size="10" fill="#1e3a8a">conf.yaml → Redis/MySQL + allowed_host_mount_prefixes</text>
  <rect x="1000" y="235" width="320" height="80" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="1020" y="258" font-size="14" font-weight="700" fill="#1e40af">Cubelet (node)</text>
  <text x="1020" y="278" font-size="11" fill="#374151">cubelet/services/cubebox</text>
  <text x="1020" y="293" font-size="11" fill="#374151">+ CubeShim 启动</text>
  <text x="1020" y="308" font-size="10" fill="#1e3a8a">runtime_type = io.containerd.cube.v2</text>
  <rect x="80" y="345" width="1240" height="115" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="370" font-size="13" font-weight="700" fill="#1e40af">L3 host 进程域 — CubeShim + cube-hypervisor 进程沙箱</text>
  <text x="100" y="390" font-size="11" fill="#374151">• VMM seccomp (5 线程: Api/SignalHandler/Vcpu/Vmm/PtyForeground) — hypervisor/vmm/src/seccomp_filters.rs:13-895</text>
  <text x="100" y="408" font-size="11" fill="#374151">• shim runtime seccomp 注入 — CubeShim/shim/src/hypervisor/cube_hypervisor.rs:70-78</text>
  <text x="100" y="426" font-size="11" fill="#374151">• no_reaper / no_sub_reaper — CubeShim/shim/src/main.rs:17-22</text>
  <text x="100" y="444" font-size="11" fill="#374151">• capability drop + virtio RateLimiter</text>
  <line x1="60" y1="525" x2="1340" y2="525" stroke="#dc2626" stroke-width="4" stroke-dasharray="14,6" opacity="0.7"/>
  <rect x="540" y="498" width="320" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="700" y="518" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">T3 KVM CORE BOUNDARY</text>
  <text x="700" y="538" text-anchor="middle" font-size="11" fill="#7f1d1d">virtio + IOMMU + 独立 guest kernel</text>
  <rect x="80" y="555" width="1240" height="85" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="578" font-size="13" font-weight="700" fill="#9a3412">L4 host 内核域 — KVM 硬件虚拟化</text>
  <text x="100" y="598" font-size="11" fill="#374151">• /dev/kvm ioctl → KVM_CREATE_VM → KVM_RUN (cloud-hypervisor 走 RustVMM)</text>
  <text x="100" y="616" font-size="11" fill="#374151">• virtio-pmem (rootfs) + virtio-net + virtiofs (cubeShared) + vsock</text>
  <text x="100" y="634" font-size="11" fill="#374151">• grub 硬化: module.sig_enforce=1, mitigations=on</text>
  <rect x="80" y="660" width="1240" height="120" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="683" font-size="13" font-weight="700" fill="#0e7490">L5 guest OS 域 (UNTRUSTED) — 独立 guest kernel</text>
  <text x="100" y="703" font-size="11" fill="#155e75">• 内核: root=/dev/pmem0 rootflags=dax,errors=remount-ro ro (CubeShim/shim/src/hypervisor/config.rs:60-83)</text>
  <text x="100" y="721" font-size="11" fill="#155e75">• cube-agent 启动: ttrpc over vsock (CID=2) ↔ host shim</text>
  <text x="100" y="739" font-size="11" fill="#155e75">• guest seccomp + capability 5-set (agent/rustjail/src/seccomp.rs, capabilities.rs)</text>
  <text x="100" y="757" font-size="11" fill="#155e75">• OCI spec: namespaces 过滤 (跳过 cgroup/net/pid) — CubeShim/shim/src/container/mod.rs:285-302</text>
  <rect x="80" y="800" width="1240" height="80" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="825" font-size="14" font-weight="700" fill="#065f46">脚本执行 — 用户代码在 OCI 容器内运行</text>
  <text x="100" y="845" font-size="11" fill="#064e3b">• cube-agent 接收执行请求 → spawn 容器进程 → rustjail 启动 containerd 容器</text>
  <text x="100" y="863" font-size="11" fill="#064e3b">• 容器进程受 guest seccomp + capability 限制,返回 stdout/stderr/exit code</text>
  <rect x="40" y="900" width="1320" height="80" rx="6" fill="#ffffff" stroke="#9ca3af" stroke-width="1"/>
  <text x="60" y="925" font-size="13" font-weight="700" fill="#1f2937">关键交互 (从顶到底顺序)</text>
  <line x1="60" y1="945" x2="100" y2="945" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="110" y="949" font-size="11" fill="#1f2937">HTTP POST /sandboxes + Bearer (T1 ingress)</text>
  <line x1="430" y1="945" x2="470" y2="945" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="480" y="949" font-size="11" fill="#1f2937">gRPC mTLS (CubeAPI ↔ CubeMaster ↔ Cubelet)</text>
  <line x1="780" y1="945" x2="820" y2="945" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="830" y="949" font-size="11" fill="#1f2937">KVM ioctl + virtio (跨 T3 边界)</text>
  <line x1="60" y1="968" x2="100" y2="968" stroke="#a16207" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="110" y="972" font-size="11" fill="#1f2937">vsock (host shim ↔ guest cube-agent, CID=2)</text>
  <line x1="500" y1="968" x2="540" y2="968" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>
  <text x="550" y="972" font-size="11" fill="#1f2937">stdin/stdout 透传</text>
  <text x="830" y="972" font-size="11" font-weight="400" fill="#6b7280">📁 mydoc/security-docs/01-35 完整机制专题</text>
  <line x1="700" y1="160" x2="700" y2="180" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="710" y="173" font-size="10" fill="#1e40af" font-weight="600">POST /sandboxes</text>
  <line x1="460" y1="275" x2="540" y2="275" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="465" y="270" font-size="10" fill="#1e40af" font-weight="600">gRPC</text>
  <text x="465" y="283" font-size="9" fill="#1e3a8a">CreateSandboxRequest</text>
  <line x1="920" y1="275" x2="1000" y2="275" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="925" y="270" font-size="10" fill="#1e40af" font-weight="600">gRPC</text>
  <text x="925" y="283" font-size="9" fill="#1e3a8a">调度选节点</text>
  <line x1="1160" y1="315" x2="1160" y2="345" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="1170" y="335" font-size="10" fill="#1e40af" font-weight="600">shim spawn</text>
  <line x1="700" y1="460" x2="700" y2="498" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="710" y="485" font-size="11" fill="#991b1b" font-weight="700">KVM_CREATE_VM</text>
  <line x1="700" y1="640" x2="700" y2="660" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="710" y="654" font-size="10" fill="#991b1b" font-weight="600">vm enter</text>
  <line x1="700" y1="780" x2="700" y2="800" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="710" y="794" font-size="10" fill="#065f46" font-weight="600">exec</text>
  <path d="M 720 840 Q 760 840 760 600 Q 760 290 470 270" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)" opacity="0.6"/>
  <text x="800" y="450" font-size="9" fill="#6b7280" font-style="italic">return: stdout/exit code via vsock</text>
</svg>