common:
  http_port: 8089
  http_readtimeout: 120
  http_writetimeout: 360
  http_idletimeout: 360
  sync_meta_data_interval: 30s
  sync_metric_data_interval: 1s
  collect_metric_interval: 1s
  default_headless_service_nodes_num: 1
  enable_check_com_net_id_param: false

log:
  module: "cubemaster"
  path: "/data/log/CubeMaster-dev"
  file_size: 100
  file_num: 10
  level: "info"

cubelet_conf:
  grpc:
    grpc_port: 9999
  common_timeout_insec: 30
  create_image_timeout_insec: 300
  create_concurrent_limit: 100
  destroy_concurent_limit: 100
  enable_exposed_port: true
  exposed_port_list:
    - "80"
  disable_redis_proxy_port: true

auth:
  enable: false

req_template_conf:
  whitelist_req_tag:
    WorkingDir: true
    RLimit: true
    DnsConfig: true
    HostAliases: true
    Poststop: true
    Prestop: true
  cube_box_req_template: >-
    {"volumes":[{"name":"tmp","volume_source":{"empty_dir":{"medium":0}}}],"containers":[{"name":"cubebox-default","envs":[{"key":"TZ","value":"Asia/Shanghai"},{"key":"TERM","value":"xterm"}],"volume_mounts":[{"name":"tmp","container_path":"/"}],"security_context":{"privileged":true,"readonly_rootfs":false,"no_new_privs":false}}],"network_type":"tap","cube_network_config":{"allowInternetAccess":true,"denyOut":["10.0.0.0/8","100.64.0.0/10","172.16.0.0/12","192.168.0.0/18"]}}

ossdb_config:
  addr: "127.0.0.1:3306"
  user: "cube"
  pwd: "cube_pass"
  db_name: "cube_mvp"
  conn_timeout: 5
  read_timeout: 5
  write_timeout: 5
  max_idle_conns: 5
  max_open_conns: 20
  max_conn_life_time_seconds: 300

instance_db_config:
  addr: "127.0.0.1:3306"
  user: "cube"
  pwd: "cube_pass"
  db_name: "cube_mvp"
  conn_timeout: 5
  read_timeout: 5
  write_timeout: 5
  max_idle_conns: 5
  max_open_conns: 20
  max_conn_life_time_seconds: 300

redis:
  nodes: "127.0.0.1:6379"
  password: "ceuhvu123"
  db_no: 0
  max_idle: 8
  max_active: 32
  idle_timeout: 30
  max_retry: 2
  node_metric_ttl_sec: 600
  # 0 = disabled; route key has no refresh path (see cubemaster.yaml comment).
  sandbox_proxy_ttl_sec: 0

scheduler:
  priority_select_num: 1
  metric_update_timeout: 300s
  local_metric_update_timeout: 300s
  # Whether to ignore the per-node allocated CPU/Mem usage recorded in Redis
  # during scheduling. Defaults to false: account for the Redis allocation
  # records when computing schedulable capacity.
  ignore_redis_allocation: false
  # Global CPU/Mem overcommit ratio applied to the node-reported quota capacity.
  # Defaults to CPU=3, Mem=2.
  overcommit_ratio:
    cpu_ratio: 3.0
    mem_ratio: 2.0
  # Per-instance-type overcommit ratio (takes precedence over the global
  # overcommit_ratio).
  # overcommit_ratio_conf:
  #   cubebox:
  #     cpu_ratio: 6.0
  #     mem_ratio: 4.0
  #   cubebox_gpu:
  #     cpu_ratio: 1.0
  #     mem_ratio: 1.0
  filter:
    enable_filters:
      - "cpu"
      - "mem"
      - "template_locality"
      - "realtime_create_num"
